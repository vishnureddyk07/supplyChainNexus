name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f services/sensor-simulator/requirements.txt ]; then
            pip install -r services/sensor-simulator/requirements.txt
          fi
          if [ -f services/ingestion/requirements.txt ]; then
            pip install -r services/ingestion/requirements.txt
          fi

      - name: Run Flake8
        run: python -m flake8 services

  tests:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run Tests
        run: pytest

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Images
        run: docker compose build

  health-check:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - uses: actions/checkout@v4

      - name: Start Containers
        run: docker compose up -d

      - name: Wait
        run: sleep 20

      - name: Container Status
        run: docker compose ps

      - name: Container Logs
        run: docker compose logs

      - name: Stop Containers
        if: always()
        run: docker compose down